<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Verify - SAMS Portal</title>
    <style>
        .verify-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #e2e9f7;
        }
        .verify-card {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .verify-card h2 {
            color: rgb(19, 117, 182);
            margin-bottom: 10px;
            font-size: 24px;
        }
        .verify-card p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.5;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .btn-verify {
            background: rgb(19, 117, 182);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-verify:hover {
            background: #155a8a;
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="verify-wrapper">
        <div class="verify-card">
            <h2>Enable Notifications</h2>
            <p>Verify your contact details to receive real-time SMS and Email alerts for school announcements and activities.</p>
            
            <div class="form-group">
                <label>Institutional Email</label>
                <input type="email" placeholder="student@act.edu.ph">
            </div>
            
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" placeholder="09XX-XXX-XXXX">
            </div>

            <a href="notifications.html" class="btn-verify">Verify and Continue</a>
            
            <a href="test.html" class="back-link">← Return to Dashboard</a>
        </div>
    </div>
</body>
</html>
